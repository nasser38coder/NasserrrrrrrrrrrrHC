<!DOCTYPE html>

        <div class="features">
            <p>📌 <strong>الميزات المتاحة:</strong></p>
            <ul>
                <li>📝 إرسال بلاغات تلقائية</li>
                <li>📧 إنشاء بريد مؤقت</li>
                <li>🔧 إنشاء حسابات إنستغرام</li>
                <li>📊 متابعة البلاغات</li>

    </div>
</body>
</html>
